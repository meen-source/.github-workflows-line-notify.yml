name: Send LINE Multi-Group Message

on:
  repository_dispatch:
    types: [form_submitted]

jobs:
  send-line:
    runs-on: ubuntu-latest
    steps:
      - name: Send Flex Message to LINE Groups
        run: |
          GROUP_IDS=("C59991631b2783da8b0c4841d3807a870" "C05c655743a65a27f6c03dcce96da31d6")
          TOKEN="OqbfAmWLiZcrcDlRtXjI0LShX9fBJJXeAJcQKuVjKS9wYTelq50YemI82NwHBOT7YktRR9C0pHgnpUe172uurXFxfOlNK6yDU6PVnUb0clqejpenNLKx4YBiBMEOgfK4sBzdcXai8r8qK6At8DP9XgdB04t89/1O/w1cDnyilFU="

          TIMESTAMP="${{ github.event.client_payload.timestamp }}"
          [ -z "$TIMESTAMP" ] && TIMESTAMP="-"
          
          NAME="${{ github.event.client_payload.name }}"
          [ -z "$NAME" ] && NAME="-"
          
          TYPE="${{ github.event.client_payload.type }}"
          [ -z "$TYPE" ] && TYPE="-"
          
          START_DATE="${{ github.event.client_payload.startDate }}"
          [ -z "$START_DATE" ] && START_DATE="-"
          
          END_DATE="${{ github.event.client_payload.endDate }}"
          [ -z "$END_DATE" ] && END_DATE="-"
          
          UNDERCONTROL="${{ github.event.client_payload.undercontrol }}"
          [ -z "$UNDERCONTROL" ] && UNDERCONTROL="-"

          ADDRESS="${{ github.event.client_payload.address }}"
          [ -z "$ADDRESS" ] && ADDRESS="-"

          MAP_URL="${{ github.event.client_payload.mapUrl }}"
          [ -z "$MAP_URL" ] && MAP_URL="-"

          REASON="${{ github.event.client_payload.reason }}"
          [ -z "$REASON" ] && REASON="-"
          
          PHONE="${{ github.event.client_payload.phone }}"
          [ -z "$PHONE" ] && PHONE="-"

          for GROUP_ID in "${GROUP_IDS[@]}"; do
            curl -X POST https://api.line.me/v2/bot/message/push \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $TOKEN" \
              -d "{
                \"to\": \"$GROUP_ID\",
                \"messages\": [{
                  \"type\": \"flex\",
                  \"altText\": \"🚨 มาตรการพิทักษ์กำลังพล สภ.บาเจาะ ($NAME)\",
                  \"contents\": {
                    \"type\": \"bubble\",
                    \"size\": \"giga\",
                    \"header\": {
                      \"type\": \"box\",
                      \"layout\": \"vertical\",
                      \"backgroundColor\": \"#8E1C1C\",
                      \"paddingAll\": \"15px\",
                      \"contents\": [{ \"type\": \"text\", \"text\": \"📢 มาตรการพิทักษ์กำลังพล สภ.บาเจาะ\", \"weight\": \"bold\", \"size\": \"md\", \"color\": \"#FFFFFF\" }]
                    },
                    \"body\": {
                      \"type\": \"box\",
                      \"layout\": \"vertical\",
                      \"contents\": [
                        { \"type\": \"box\", \"layout\": \"horizontal\", \"margin\": \"sm\", \"contents\": [{ \"type\": \"text\", \"text\": \"👤 ยศ ชื่อ-สกุล:\", \"weight\": \"bold\", \"size\": \"sm\", \"color\": \"#555555\", \"flex\": 2 }, { \"type\": \"text\", \"text\": \"$NAME\", \"size\": \"sm\", \"color\": \"#111111\", \"flex\": 3, \"wrap\": true }] },
                        { \"type\": \"box\", \"layout\": \"horizontal\", \"margin\": \"sm\", \"contents\": [{ \"type\": \"text\", \"text\": \"📅 ประเภทการลา:\", \"weight\": \"bold\", \"size\": \"sm\", \"color\": \"#555555\", \"flex\": 2 }, { \"type\": \"text\", \"text\": \"$TYPE\", \"size\": \"sm\", \"color\": \"#111111\", \"flex\": 3, \"wrap\": true }] },
                        { \"type\": \"box\", \"layout\": \"horizontal\", \"margin\": \"sm\", \"contents\": [{ \"type\": \"text\", \"text\": \"📆 เริ่มต้นวันลา:\", \"weight\": \"bold\", \"size\": \"sm\", \"color\": \"#555555\", \"flex\": 2 }, { \"type\": \"text\", \"text\": \"$START_DATE\", \"size\": \"sm\", \"color\": \"#111111\", \"flex\": 3, \"wrap\": true }] },
                        { \"type\": \"box\", \"layout\": \"horizontal\", \"margin\": \"sm\", \"contents\": [{ \"type\": \"text\", \"text\": \"📆 สิ้นสุดวันลา:\", \"weight\": \"bold\", \"size\": \"sm\", \"color\": \"#555555\", \"flex\": 2 }, { \"type\": \"text\", \"text\": \"$END_DATE\", \"size\": \"sm\", \"color\": \"#111111\", \"flex\": 3, \"wrap\": true }] },
                        { \"type\": \"box\", \"layout\": \"horizontal\", \"margin\": \"sm\", \"contents\": [{ \"type\": \"text\", \"text\": \"🏠 ที่อยู่ขณะลา:\", \"weight\": \"bold\", \"size\": \"sm\", \"color\": \"#555555\", \"flex\": 2 }, { \"type\": \"text\", \"text\": \"$ADDRESS\", \"size\": \"sm\", \"color\": \"#111111\", \"flex\": 3, \"wrap\": true }] },
                        { \"type\": \"box\", \"layout\": \"horizontal\", \"margin\": \"sm\", \"contents\": [{ \"type\": \"text\", \"text\": \"📍 พิกัด:\", \"weight\": \"bold\", \"size\": \"sm\", \"color\": \"#555555\", \"flex\": 2 }, { \"type\": \"text\", \"text\": \"$MAP_URL\", \"size\": \"sm\", \"color\": \"#0066CC\", \"flex\": 3, \"wrap\": true }] },
                        { \"type\": \"box\", \"layout\": \"horizontal\", \"margin\": \"sm\", \"contents\": [{ \"type\": \"text\", \"text\": \"📞 เบอร์โทร:\", \"weight\": \"bold\", \"size\": \"sm\", \"color\": \"#555555\", \"flex\": 2 }, { \"type\": \"text\", \"text\": \"$PHONE\", \"size\": \"sm\", \"color\": \"#111111\", \"flex\": 3, \"wrap\": true }] },
                        { \"type\": \"box\", \"layout\": \"horizontal\", \"margin\": \"sm\", \"contents\": [{ \"type\": \"text\", \"text\": \"📝 เหตุผล:\", \"weight\": \"bold\", \"size\": \"sm\", \"color\": \"#555555\", \"flex\": 2 }, { \"type\": \"text\", \"text\": \"$REASON\", \"size\": \"sm\", \"color\": \"#111111\", \"flex\": 3, \"wrap\": true }] },
                        { \"type\": \"box\", \"layout\": \"horizontal\", \"margin\": \"sm\", \"contents\": [{ \"type\": \"text\", \"text\": \"🚔 สภ.ฯ ที่รับผิดชอบ:\", \"weight\": \"bold\", \"size\": \"sm\", \"color\": \"#555555\", \"flex\": 2 }, { \"type\": \"text\", \"text\": \"$UNDERCONTROL\", \"size\": \"sm\", \"color\": \"#111111\", \"flex\": 3, \"wrap\": true }] },
                        { \"type\": \"separator\", \"margin\": \"lg\" },
                        { \"type\": \"text\", \"text\": \"ส่งคำขอเมื่อ: $TIMESTAMP\", \"size\": \"xs\", \"color\": \"#999999\", \"margin\": \"md\" }
                      ]
                    },
                    \"footer\": {
                      \"type\": \"box\",
                      \"layout\": \"vertical\",
                      \"spacing\": \"sm\",
                      \"contents\": [
                        { \"type\": \"box\", \"layout\": \"horizontal\", \"spacing\": \"sm\", \"contents\": [
                          { 
                            \"type\": \"button\", 
                            \"style\": \"primary\", 
                            \"color\": \"#28A745\", 
                            \"action\": { 
                              \"type\": \"message\", 
                              \"label\": \"✅ อนุมัติ\", 
                              \"text\": \"🟢 [ผลการพิจารณา: อนุมัติ มาตรการพิทักษ์กำลังพล สภ.บาเจาะ]\n👤 ชื่อ-สกุล: $NAME\n📅 ประเภท: $TYPE\n📆 ตั้งแต่: $START_DATE ถึง $END_DATE\n🏠 ที่อยู่: $ADDRESS\n📍 พิกัด: $MAP_URL\n🚔 สภ.ฯ รับผิดชอบ: $UNDERCONTROL\n📞 เบอร์โทร: $PHONE\n📝 เหตุผล: $REASON\" 
                            } 
                          },
                          { 
                            \"type\": \"button\", 
                            \"style\": \"primary\", 
                            \"color\": \"#DC3545\", 
                            \"action\": { 
                              \"type\": \"message\", 
                              \"label\": \"❌ ไม่อนุมัติ\", 
                              \"text\": \"🔴 [ผลการพิจารณา: ไม่อนุมัติ]\n👤 ชื่อ-สกุล: $NAME\n📅 ประเภท: $TYPE\n📆 ตั้งแต่: $START_DATE ถึง $END_DATE\n📝 เหตุผล: $REASON\" 
                            } 
                          }
                        ]}
                      ]
                    }
                  }
                }]
              }"
            sleep 1
          done
